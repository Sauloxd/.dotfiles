- defaults:
    link:
      relink: true
      force: true

- clean: ['~']

- link:
    ~/.hushlogin: shell/hushlogin
    ~/.bashrc: shell/bashrc
    ~/.ubuntu_bashrc: shell/ubuntu_bashrc
    ~/.zshrc: shell/zshrc
    ~/.tmux.conf: apps/tmux/tmux.conf
    ~/.tmux.conf.local: apps/tmux/tmux.conf.local
    ~/.gitignore_global: apps/git/gitignore_global
    ~/.gitconfig: apps/git/gitconfig
    ~/.config/doom/:
      path: apps/emacs/**
      glob: true
      create: true
    ~/.config/karabiner/karabiner.json:
      path: apps/karabiner/karabiner.json
      create: true
    ~/.claude/agents:
      path: .claude/agents
      create: true
    ~/.claude/commands:
      path: .claude/commands
      create: true
    ~/.claude/CLAUDE.md: .claude/CLAUDE.md
    ~/.vimrc: apps/vim/.vimrc
    ~/.config/nvim/init.vim:
      path: apps/vim/init.vim
      create: true

- shell:
  - [git submodule update --init --recursive, Installing submodules]
